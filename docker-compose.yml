services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - passports-data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET to a random 32+ byte value}
      - LOCATION_CSC_PASSWORD_HASH=${LOCATION_CSC_PASSWORD_HASH:?set LOCATION_CSC_PASSWORD_HASH to a bcrypt hash}
      - LOCATION_BOOKSTORE_PASSWORD_HASH=${LOCATION_BOOKSTORE_PASSWORD_HASH:?set LOCATION_BOOKSTORE_PASSWORD_HASH to a bcrypt hash}
      - DATABASE_URL=sqlite+aiosqlite:////data/passports.db

volumes:
  passports-data:
